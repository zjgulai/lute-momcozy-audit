name: Verify and Publish Public Audit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - uses: actions/upload-pages-artifact@v5
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy immutable verified artifact
        id: deployment
        uses: actions/deploy-pages@v5

  trigger-platform-rebuild:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger lute-momcozy-platform rebuild with latest data
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_TRIGGER_TOKEN }}
          repository: zjgulai/lute-momcozy-platform
          event-type: audit-data-updated
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "triggered_by": "lute-momcozy-audit pages.yml"
            }

