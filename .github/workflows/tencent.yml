name: Publish Verified Artifact to Tencent

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: tencent-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - name: Validate local build structure parity against production
        env:
          PROD_BASE_URL: ${{ secrets.PUBLIC_URL }}
        run: |
          PUBLIC_URL="${PROD_BASE_URL}"
          if [ -z "$PUBLIC_URL" ]; then
            PUBLIC_URL="https://shopify.lute-tlz-dddd.top"
          fi
          mkdir -p artifacts
          PROD_BASE_URL="$PUBLIC_URL" \
            RELEASE_PARITY_REPORT_PATH="artifacts/release-parity-${GITHUB_SHA}.json" \
            RELEASE_PARITY_ALLOW_PROD_MISSING_SECTIONS="/cross-audit.html:third-party-governance,/cross-audit.html:segment-sampling" \
            npm run test:release-parity
      - name: Generate SHA-256 manifest
        run: (cd _site && find . -type f -print0 | sort -z | xargs -0 sha256sum) > site.sha256
      - name: Upload verified site artifact
        uses: actions/upload-artifact@v7
        with:
          name: verified-site-${{ github.sha }}
          path: |
            artifacts/release-parity-${{ github.sha }}.json
            _site/
            site.sha256
          include-hidden-files: true
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: tencent-production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Download verified site artifact
        uses: actions/download-artifact@v8
        with:
          name: verified-site-${{ github.sha }}
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_HOST"
          install -m 700 -d ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          timeout 60 ssh-keyscan -T 30 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Upload verified staging release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_ROOT"
          test -n "$DEPLOY_USER"
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=60 -o ServerAliveInterval=10 -o ServerAliveCountMax=4"
          STAGE="${DEPLOY_ROOT}/staging/${GITHUB_SHA}"
          $SSH "${DEPLOY_USER}@${DEPLOY_HOST}" "rm -rf '${STAGE}' && mkdir -p '${STAGE}/site'"
          rsync -az --delete -e "$SSH" _site/ "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGE}/site/"
          scp -i ~/.ssh/deploy_key -o ConnectTimeout=60 site.sha256 \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGE}/site.sha256"
      - name: Deploy only the isolated Momcozy directory
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: |
          test -n "$PUBLIC_URL"
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=60 \
            -o ServerAliveInterval=10 -o ServerAliveCountMax=4 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash -s -- '${DEPLOY_ROOT}' '${GITHUB_SHA}' '${PUBLIC_URL}'" <<'REMOTE'
          set -Eeuo pipefail
          ROOT=$1
          RELEASE=$2
          PUBLIC_URL=$3
          LIVE="${ROOT}/html"
          STAGE="${ROOT}/staging/${RELEASE}"
          BACKUP="${ROOT}/workflow-backups/${RELEASE}"
          ROLLBACK_NEEDED=0
          rollback() {
            status=$?
            set +e
            if [ "$ROLLBACK_NEEDED" = 1 ]; then
              rsync -a --delete "${BACKUP}/html/" "${LIVE}/"
            fi
            rm -rf -- "${STAGE}"
            exit "$status"
          }
          trap rollback ERR
          header_value() {
            local url=$1
            local header=$2
            local header_lc="${header,,}"
            local line
            local value=""
            local tmp_headers="/tmp/headers.$$"
            curl --connect-timeout 5 --max-time 20 -sS -I "$url" > "$tmp_headers"
            while IFS= read -r line; do
              line="${line%$'\r'}"
              if [[ "${line,,}" == "${header_lc}:"* ]]; then
                value="${line#*:}"
                value="${value#"${value%%[![:space:]]*}"}"
                break
              fi
            done < "$tmp_headers"
            rm -f "$tmp_headers"
            test -n "$value"
            printf '%s' "$value"
          }
          status_code() {
            curl --connect-timeout 5 --max-time 20 -sS -o /dev/null -w '%{http_code}' "$1"
          }
          contains() {
            local haystack=$1
            local needle=$2
            case "$haystack" in
              *"$needle"*) return 0;;
              *) return 1;;
            esac
          }
          contains_ci() {
            local haystack=${1,,}
            local needle=${2,,}
            case "$haystack" in
              *"$needle"*) return 0;;
              *) return 1;;
            esac
          }
          expect_header() {
            local url=$1
            local header=$2
            local expected=$3
            local value
            value="$(header_value "$url" "$header")"
            contains_ci "$value" "$expected"
          }
          expect_cache_control() {
            local url=$1
            local value
            value="$(header_value "$url" "cache-control")"
            value="${value,,}"
            contains "$value" "no-store" || contains "$value" "no-cache"
          }
          expect_headers() {
            expect_header "$1" "content-security-policy" "default-src 'self'"
            expect_header "$1" "content-security-policy" "style-src 'self' 'unsafe-inline'"
            expect_header "$1" "x-frame-options" "DENY"
            expect_header "$1" "x-content-type-options" "nosniff"
            expect_header "$1" "permissions-policy" "camera=()"
            expect_cache_control "$1"
          }
          expect_noindex_page() {
            local url=$1
            local body
            local robots
            local robots_body
            body="$(curl --connect-timeout 5 --max-time 20 -sS "$url")"
            if [[ "$body" == *'<meta name="robots" content="noindex, nofollow"'* ]]; then
              return 0
            fi
            robots="$(curl --connect-timeout 5 --max-time 20 -sS -o /dev/null -w '%{http_code}' "${url}robots.txt")"
            if [ "$robots" = "200" ]; then
              robots_body="$(curl --connect-timeout 5 --max-time 20 -sS "${url}robots.txt")"
              if [[ "$robots_body" == *"Disallow: /"* ]]; then
                return 0
              fi
            fi
            echo "WARNING: noindex metadata missing on $url; continuing with non-blocking policy check" >&2
          }
          expect_chinese_page() {
            local url=$1
            local body
            body="$(curl --connect-timeout 5 --max-time 20 -sS "$url")"
            contains "$body" 'lang="zh-CN"'
            contains "$body" "路特 AI"
            contains "$body" "Momcozy"
            contains "$body" "私密经营"
          }
          expect_private_path_blocked() {
            local url=$1
            local code
            code="$(status_code "$url")"
            test "$code" = "403" -o "$code" = "404"
          }
          expect_code() {
            test "$(status_code "$2")" = "$1"
          }
          cd "${STAGE}/site"
          sha256sum -c ../site.sha256
          install -d -m 0750 "${BACKUP}/html"
          cp -a "${LIVE}/." "${BACKUP}/html/"
          ROLLBACK_NEEDED=1
          rsync -a --delete "${STAGE}/site/" "${LIVE}/"
          cd "${LIVE}"
          sha256sum -c "${STAGE}/site.sha256"
          expect_chinese_page "${PUBLIC_URL}/"
          expect_headers "${PUBLIC_URL}/"
          expect_noindex_page "${PUBLIC_URL}/"
          expect_code 200 "${PUBLIC_URL}/"
          expect_code 200 "${PUBLIC_URL}/metrics"
          expect_code 404 "${PUBLIC_URL}/metrics/"
          expect_code 200 "${PUBLIC_URL}/metrics.html"
          expect_code 200 "${PUBLIC_URL}/forensics"
          expect_code 404 "${PUBLIC_URL}/forensics/"
          expect_code 200 "${PUBLIC_URL}/forensics.html"
          expect_code 200 "${PUBLIC_URL}/trends"
          expect_code 404 "${PUBLIC_URL}/trends/"
          expect_code 200 "${PUBLIC_URL}/trends.html"
          expect_code 200 "${PUBLIC_URL}/cross-audit.html"
          expect_code 404 "${PUBLIC_URL}/cross-audit/"
          expect_chinese_page "${PUBLIC_URL}/metrics.html"
          expect_chinese_page "${PUBLIC_URL}/forensics.html"
          expect_chinese_page "${PUBLIC_URL}/trends.html"
          expect_chinese_page "${PUBLIC_URL}/cross-audit.html"
          expect_code 404 "${PUBLIC_URL}/not-a-real-page"
          expect_chinese_page "${PUBLIC_URL}/404.html"
          expect_private_path_blocked "${PUBLIC_URL}/private-audit-canary"
          ROLLBACK_NEEDED=0
          rm -rf -- "${STAGE}"
          REMOTE
      - name: External post-deploy smoke tests
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: |
          status_code() {
            curl --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 30 -sS -o /dev/null -w '%{http_code}' "$1"
          }
          expect_code() {
            test "$(status_code "$2")" = "$1"
          }
          expect_chinese_page() {
            local url=$1
            local body
            body="$(curl --retry 3 --retry-delay 2 --retry-all-errors --connect-timeout 10 --max-time 30 -sS "$url")"
            printf '%s\n' "$body" | grep -q 'lang="zh-CN"'
            printf '%s\n' "$body" | grep -q "路特 AI"
            printf '%s\n' "$body" | grep -q "Momcozy"
            printf '%s\n' "$body" | grep -q "私密经营"
          }
          expect_code 200 "${PUBLIC_URL}/"
          expect_code 200 "${PUBLIC_URL}/metrics"
          expect_code 404 "${PUBLIC_URL}/metrics/"
          expect_code 200 "${PUBLIC_URL}/metrics.html"
          expect_code 200 "${PUBLIC_URL}/forensics"
          expect_code 404 "${PUBLIC_URL}/forensics/"
          expect_code 200 "${PUBLIC_URL}/forensics.html"
          expect_code 200 "${PUBLIC_URL}/trends"
          expect_code 404 "${PUBLIC_URL}/trends/"
          expect_code 200 "${PUBLIC_URL}/trends.html"
          expect_code 200 "${PUBLIC_URL}/cross-audit.html"
          expect_code 404 "${PUBLIC_URL}/cross-audit/"
          expect_chinese_page "${PUBLIC_URL}/"
          expect_chinese_page "${PUBLIC_URL}/metrics.html"
          expect_chinese_page "${PUBLIC_URL}/forensics.html"
          expect_chinese_page "${PUBLIC_URL}/trends.html"
          expect_chinese_page "${PUBLIC_URL}/cross-audit.html"
          expect_chinese_page "${PUBLIC_URL}/404.html"
          expect_code 404 "${PUBLIC_URL}/not-a-real-page"
          private_code="$(status_code "${PUBLIC_URL}/private-audit-canary")"
          test "$private_code" = "403" -o "$private_code" = "404"
      - name: Production visual component audit
        if: always()
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: |
          test -n "$PUBLIC_URL"
          PRODUCTION_LAYOUT_BASE_URL="$PUBLIC_URL" \
            PRODUCTION_LAYOUT_OUTPUT_DIR="artifacts/production-layout-${GITHUB_SHA}" \
            npm run audit:production-layout
      - name: Write production visual audit summary
        if: always()
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
          AUDIT_DIR: artifacts/production-layout-${{ github.sha }}
          AUDIT_ARTIFACT_NAME: production-layout-audit-${{ github.sha }}
        run: |
          {
            echo "## Production visual component audit"
            echo ""
            echo "- Public URL: ${PUBLIC_URL:-not configured}"
            echo "- Artifact: \`${AUDIT_ARTIFACT_NAME}\`"
            echo "- Artifact list: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}#artifacts"
            echo "- Report file inside artifact: \`production-layout-audit.md\`"
            echo ""
            if [ -f "${AUDIT_DIR}/production-layout-audit.md" ]; then
              sed -n '1,34p' "${AUDIT_DIR}/production-layout-audit.md"
            else
              echo "Production visual audit report was not generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload production visual audit evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-layout-audit-${{ github.sha }}
          path: artifacts/production-layout-${{ github.sha }}/
          if-no-files-found: warn
          retention-days: 14
