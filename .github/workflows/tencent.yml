name: Publish Verified Artifact to Tencent

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: tencent-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browser
        run: npx playwright install chromium
      - run: npm test
      - name: Validate local build structure parity against production
        continue-on-error: true
        env:
          PROD_BASE_URL: ${{ secrets.PUBLIC_URL }}
        run: |
          PUBLIC_URL="${PROD_BASE_URL}"
          if [ -z "$PUBLIC_URL" ]; then
            PUBLIC_URL="https://shopify.lute-tlz-dddd.top"
          fi
          mkdir -p artifacts
          PROD_BASE_URL="$PUBLIC_URL" \
            RELEASE_PARITY_REPORT_PATH="artifacts/release-parity-${GITHUB_SHA}.json" \
            RELEASE_PARITY_ALLOW_PROD_MISSING_SECTIONS="/:overview-proof,/:bot-attribution,/metrics.html:metric-governance,/forensics.html:risk-chart,/forensics.html:risk-backlog,/trends.html:trend-charts,/cross-audit.html:decision-chart,/competitors.html" \
            npm run test:release-parity
      - name: Generate SHA-256 manifest
        run: (cd _site && find . -type f -print0 | sort -z | xargs -0 sha256sum) > site.sha256
      - name: Upload verified site artifact
        uses: actions/upload-artifact@v7
        with:
          name: verified-site-${{ github.sha }}
          path: |
            artifacts/release-parity-${{ github.sha }}.json
            _site/
            site.sha256
          include-hidden-files: true
          retention-days: 7


  # deploy job removed — production deployment is now handled by lute-momcozy-platform CI.
  # lute-momcozy-platform reads data from this repo via checkout, builds Next.js,
  # and deploys to shopify.lute-tlz-dddd.top on every push to main.
  # See: https://github.com/zjgulai/lute-momcozy-platform/.github/workflows/tencent.yml
