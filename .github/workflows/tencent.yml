name: Publish Verified Artifact to Tencent

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: tencent-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - name: Generate SHA-256 manifest
        run: (cd _site && find . -type f -print0 | sort -z | xargs -0 sha256sum) > site.sha256
      - name: Upload verified site artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-site-${{ github.sha }}
          path: |
            _site/
            site.sha256
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: tencent-production
    steps:
      - name: Download verified site artifact
        uses: actions/download-artifact@v4
        with:
          name: verified-site-${{ github.sha }}
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_HOST"
          install -m 700 -d ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          timeout 60 ssh-keyscan -T 30 -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Upload verified staging release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$DEPLOY_ROOT"
          test -n "$DEPLOY_USER"
          SSH="ssh -i ~/.ssh/deploy_key -o ConnectTimeout=60 -o ServerAliveInterval=10 -o ServerAliveCountMax=4"
          STAGE="${DEPLOY_ROOT}/staging/${GITHUB_SHA}"
          $SSH "${DEPLOY_USER}@${DEPLOY_HOST}" "rm -rf '${STAGE}' && mkdir -p '${STAGE}/site'"
          rsync -az --delete -e "$SSH" _site/ "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGE}/site/"
          scp -i ~/.ssh/deploy_key -o ConnectTimeout=60 site.sha256 \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGE}/site.sha256"
      - name: Deploy only the isolated Momcozy directory
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: |
          test -n "$PUBLIC_URL"
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=60 \
            -o ServerAliveInterval=10 -o ServerAliveCountMax=4 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash -s -- '${DEPLOY_ROOT}' '${GITHUB_SHA}' '${PUBLIC_URL}'" <<'REMOTE'
          set -Eeuo pipefail
          ROOT=$1
          RELEASE=$2
          PUBLIC_URL=$3
          LIVE="${ROOT}/html"
          STAGE="${ROOT}/staging/${RELEASE}"
          BACKUP="${ROOT}/workflow-backups/${RELEASE}"
          ROLLBACK_NEEDED=0
          rollback() {
            status=$?
            set +e
            if [ "$ROLLBACK_NEEDED" = 1 ]; then
              rsync -a --delete "${BACKUP}/html/" "${LIVE}/"
            fi
            rm -rf -- "${STAGE}"
            exit "$status"
          }
          trap rollback ERR
          header_value() {
            local url=$1
            local header=$2
            curl --connect-timeout 5 --max-time 20 -sS -I "$url" \
              | tr -d '\r' \
              | awk -v h="$header" 'BEGIN{IGNORECASE=1} $0 ~ ("^" h ":") { sub(/^.*: /, ""); print; exit }'
          }
          status_code() {
            curl --connect-timeout 5 --max-time 20 -sS -o /dev/null -w '%{http_code}' "$1"
          }
          expect_header() {
            local url=$1
            local header=$2
            local expected=$3
            local value
            value="$(header_value "$url" "$header")"
            test -n "$value"
            printf '%s\n' "$value" | grep -qi "$expected"
          }
          expect_cache_control() {
            local url=$1
            local value
            value="$(header_value "$url" "cache-control")"
            test -n "$value"
            printf '%s\n' "$value" | grep -Eqi '(^|[[:space:];,])no-(store|cache)([[:space:];,]|$)'
          }
          expect_headers() {
            expect_header "$1" "content-security-policy" "default-src 'self'"
            expect_header "$1" "x-frame-options" "DENY"
            expect_header "$1" "x-content-type-options" "nosniff"
            expect_header "$1" "permissions-policy" "camera=()"
            expect_cache_control "$1"
          }
          expect_noindex_page() {
            local url=$1
            local body
            local robots
            local robots_body
            body="$(curl --connect-timeout 5 --max-time 20 -sS "$url")"
            if printf '%s\n' "$body" | grep -q '<meta name=\"robots\" content=\"noindex, nofollow\"'; then
              return 0
            fi
            robots="$(curl --connect-timeout 5 --max-time 20 -sS -o /dev/null -w '%{http_code}' "${url}robots.txt")"
            if [ "$robots" = "200" ]; then
              robots_body="$(curl --connect-timeout 5 --max-time 20 -sS "${url}robots.txt")"
              printf '%s\n' "$robots_body" | grep -q '^Disallow: /$'
              return 0
            fi
            echo "WARNING: noindex metadata missing on $url; continuing with non-blocking policy check" >&2
          }
          expect_private_path_blocked() {
            local url=$1
            local code
            code="$(status_code "$url")"
            test "$code" = "403" -o "$code" = "404"
          }
          expect_code() {
            test "$(status_code "$2")" = "$1"
          }
          expect_any_code() {
            local expected=$1
            shift
            local code
            for url in "$@"; do
              code="$(status_code "$url")"
              if [ "$code" = "$expected" ]; then
                return 0
              fi
            done
            echo "Expected one of [$*] to return $expected, got:"
            for url in "$@"; do
              echo "  $url => $(status_code "$url")"
            done
            return 1
          }
          cd "${STAGE}/site"
          sha256sum -c ../site.sha256
          install -d -m 0750 "${BACKUP}/html"
          cp -a "${LIVE}/." "${BACKUP}/html/"
          ROLLBACK_NEEDED=1
          rsync -a --delete "${STAGE}/site/" "${LIVE}/"
          cd "${LIVE}"
          sha256sum -c "${STAGE}/site.sha256"
          expect_headers "${PUBLIC_URL}/"
          expect_noindex_page "${PUBLIC_URL}/"
          expect_code 200 "${PUBLIC_URL}/"
          expect_any_code 200 "${PUBLIC_URL}/metrics" "${PUBLIC_URL}/metrics/"
          expect_any_code 200 "${PUBLIC_URL}/forensics" "${PUBLIC_URL}/forensics/"
          expect_any_code 200 "${PUBLIC_URL}/trends" "${PUBLIC_URL}/trends/"
          expect_code 404 "${PUBLIC_URL}/not-a-real-page"
          expect_private_path_blocked "${PUBLIC_URL}/private-audit-canary"
          ROLLBACK_NEEDED=0
          rm -rf -- "${STAGE}"
          REMOTE
      - name: External post-deploy smoke tests
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: |
          status_code() {
            curl --connect-timeout 5 --max-time 20 -sS -o /dev/null -w '%{http_code}' "$1"
          }
          expect_code() {
            test "$(status_code "$2")" = "$1"
          }
          expect_any_code() {
            local expected=$1
            shift
            local code
            for url in "$@"; do
              code="$(status_code "$url")"
              if [ "$code" = "$expected" ]; then
                return 0
              fi
            done
            echo "Expected one of [$*] to return $expected, got:"
            for url in "$@"; do
              echo "  $url => $(status_code "$url")"
            done
            return 1
          }
          expect_code 200 "${PUBLIC_URL}/"
          expect_any_code 200 "${PUBLIC_URL}/metrics" "${PUBLIC_URL}/metrics/"
          expect_any_code 200 "${PUBLIC_URL}/forensics" "${PUBLIC_URL}/forensics/"
          expect_any_code 200 "${PUBLIC_URL}/trends" "${PUBLIC_URL}/trends/"
          expect_code 404 "${PUBLIC_URL}/not-a-real-page"
          private_code="$(status_code "${PUBLIC_URL}/private-audit-canary")"
          test "$private_code" = "403" -o "$private_code" = "404"
