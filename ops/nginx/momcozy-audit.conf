server {
    listen 80;
    server_name audit.example.invalid;
    root /srv/lute-momcozy-audit/current;
    index index.html;

    location ^~ /data/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

